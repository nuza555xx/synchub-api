steps:
  - name: 'node:22-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "Step 1: Installing dependencies"
        corepack enable && corepack prepare pnpm@10.12.1 --activate
        pnpm install --frozen-lockfile --ignore-scripts

  - name: 'node:22-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "Step 2: Building TypeScript artifacts"
        corepack enable && corepack prepare pnpm@10.12.1 --activate
        pnpm build
        echo "Build output:"
        ls -la dist/

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        IMAGE_TAG="${SHORT_SHA}"
        echo "Step 3: Building Docker image"
        echo "Image: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:$${IMAGE_TAG}"
        docker build -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:$${IMAGE_TAG} .
        echo "$${IMAGE_TAG}" > /workspace/image_tag

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        IMAGE_TAG=$$(cat /workspace/image_tag)
        echo "Step 4: Pushing image to Artifact Registry"
        echo "Image: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:$${IMAGE_TAG}"
        docker push ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:$${IMAGE_TAG}

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        IMAGE_TAG=$$(cat /workspace/image_tag)
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:$${IMAGE_TAG}"
        echo "Step 5: Deploying to Cloud Run"
        echo "Image: $${IMAGE}"
        sed -i "s|IMAGE_PLACEHOLDER|$${IMAGE}|g" deployment/service.yaml
        gcloud run services replace deployment/service.yaml --region asia-southeast1
        echo "Step 6: Allowing unauthenticated access"
        gcloud run services add-iam-policy-binding ${_SERVICE_NAME} \
          --region=asia-southeast1 \
          --member="allUsers" \
          --role="roles/run.invoker"

options:
  logging: CLOUD_LOGGING_ONLY
