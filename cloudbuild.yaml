steps:
  - name: 'node:22-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "========================================="
        echo "Step 1: Installing dependencies"
        echo "========================================="
        corepack enable && corepack prepare pnpm@10.12.1 --activate
        pnpm install --frozen-lockfile --ignore-scripts

  - name: 'node:22-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "========================================="
        echo "Step 2: Building TypeScript artifacts"
        echo "========================================="
        corepack enable && corepack prepare pnpm@10.12.1 --activate
        pnpm build
        echo "Build output:"
        ls -la dist/

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "========================================="
        echo "Step 3: Building Docker image"
        echo "Image: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${TAG_NAME}"
        echo "========================================="
        docker build -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${TAG_NAME} .

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "========================================="
        echo "Step 4: Pushing image to Artifact Registry"
        echo "Image: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${TAG_NAME}"
        echo "========================================="
        docker push ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${TAG_NAME}

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${TAG_NAME}'

options:
  logging: CLOUD_LOGGING_ONLY
