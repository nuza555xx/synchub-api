apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: synchub-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '3'
        run.googleapis.com/startup-cpu-boost: 'true'
        run.googleapis.com/secrets: 'synchub-api:projects/1062785313682/secrets/synchub-api/versions/1'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: CORS_ORIGIN
              value: https://synchub-web-1062785313682.asia-southeast1.run.app,http://localhost:3000
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: SUPABASE_URL
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: SUPABASE_ANON_KEY
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: SUPABASE_SERVICE_ROLE_KEY
            - name: AUTH_HASH_SECRET
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: AUTH_HASH_SECRET
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            periodSeconds: 30
            failureThreshold: 3
          resources:
            limits:
              cpu: '1'
              memory: 128Mi
