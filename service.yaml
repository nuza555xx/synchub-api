apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: synchub-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '3'
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: CORS_ORIGIN
              value: https://localhost:3000
          volumeMounts:
            - name: secret-env
              mountPath: /app/dist/.env
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            periodSeconds: 30
            failureThreshold: 3
          resources:
            limits:
              cpu: '1'
              memory: 512Mi
      volumes:
        - name: secret-env
          secret:
            secretName: synchub-api
            items:
              - key: '1'
                path: .env
